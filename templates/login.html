{% extends "base.html" %}
{% block content %}

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-header">
            <div class="terminal-line">SYSTEM::AUTH_MODULE</div>
            <h2>ACCESS TERMINAL</h2>
            <div class="divider"></div>
        </div>

        <form method="POST" class="login-form">
            <div class="input-group">
                <label><span class="prompt">&gt;</span> AGENT_ID</label>
                <input type="text" name="username" placeholder="enter username" autocomplete="off" required>
            </div>
            <div class="input-group">
                <label><span class="prompt">&gt;</span> PASSKEY</label>
                <input type="password" name="password" placeholder="••••••••••" required>
            </div>
            <button type="submit" class="btn-primary">
                <span>AUTHENTICATE</span>
                <span class="btn-arrow">→</span>
            </button>
        </form>

        <div class="login-footer">
            <span class="blink-dot"></span> SECURE CHANNEL ACTIVE
        </div>
    </div>
</div>

{% endblock %}

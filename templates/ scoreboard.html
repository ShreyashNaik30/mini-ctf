{% extends "base.html" %}
{% block content %}

<h2>Scoreboard</h2>

<table class="score-table">
    <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Score</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ loop.index }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.score }}</td>
    </tr>
    {% endfor %}
</table>

<div class="center">
    <a href="{{ url_for('dashboard') }}">
        <button>Back</button>
    </a>
</div>

{% endblock %}
